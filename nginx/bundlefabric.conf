# BundleFabric — Nginx Config
# Domain: bundlefabric.org (HTTPS sur IP publique 135.125.196.150)
# Tailscale 100.84.103.104:443 = autres services internes — NE PAS MODIFIER

# HTTP → HTTPS redirect (toutes interfaces)
server {
    listen 135.125.196.150:80;
    server_name bundlefabric.org www.bundlefabric.org app.bundlefabric.org api.bundlefabric.org;

    location /.well-known/acme-challenge/ {
        root /var/www/bundlefabric;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — bundlefabric.org + www (IP publique uniquement)
server {
    listen 135.125.196.150:443 ssl http2;
    server_name bundlefabric.org www.bundlefabric.org;

    ssl_certificate /etc/letsencrypt/live/bundlefabric.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bundlefabric.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /var/www/bundlefabric;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# HTTPS — app.bundlefabric.org
server {
    listen 135.125.196.150:443 ssl http2;
    server_name app.bundlefabric.org;

    ssl_certificate /etc/letsencrypt/live/bundlefabric.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bundlefabric.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    # Phase 2 : décommenter pour activer WebUI
    # location / {
    #     proxy_pass http://127.0.0.1:19101;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-Proto https;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    # }

    location / {
        root /var/www/bundlefabric;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

# HTTPS — api.bundlefabric.org
server {
    listen 135.125.196.150:443 ssl http2;
    server_name api.bundlefabric.org;

    ssl_certificate /etc/letsencrypt/live/bundlefabric.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bundlefabric.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header X-Content-Type-Options nosniff always;

    # Phase 2 : décommenter pour activer l'API
    # location / {
    #     proxy_pass http://127.0.0.1:19100;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-Proto https;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_read_timeout 300;
